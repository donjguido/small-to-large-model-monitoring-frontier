    organizations: ["Google DeepMind"]
    is_foundational: false
    annotation: >
      Shows CCS doesn't discover knowledge per se — arbitrary non-truth
      features satisfy its consistency structure. The canonical theoretical
      critique of unsupervised-probe claims.

  - id: tice-2024-noise-injection
    title: "Noise Injection Reveals Hidden Capabilities of Sandbagging Language Models"
    authors: [Cameron Tice, Philipp Kreer, Nathan Helm-Burger, "…", Teun van der Weij]
