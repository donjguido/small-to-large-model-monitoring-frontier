  - id: openai-apollo-2025-stress-testing
    title: "Stress Testing Deliberative Alignment for Anti-Scheming Training"
    authors: [Bronson Schoen, Mikita Balesni, Jérémy Scheurer, Marius Hobbhahn, "…", Johannes Heidecke]
    year: 2025
    venue: "arXiv preprint (OpenAI × Apollo)"
    arxiv_id: "2509.15541"
    url: "https://arxiv.org/abs/2509.15541"
    category_id: threats
    tags: [critical, empirical, situational-awareness, cautionary]
    organizations: [OpenAI, "Apollo Research"]
    is_foundational: false
    annotation: >
      Anti-scheming training reduces covert actions ~30× on o3/o4-mini — but
      counterfactual tests show evaluation-awareness *causally* reduces covert
      action, so the "safer" numbers partly reflect better test-detection, not
      genuine alignment. The most important current cautionary result on
      training-signal monitoring.

