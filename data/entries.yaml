    organizations: [academia]
    is_foundational: false
    annotation: >
      Gaussian weight-noise sandbagging detector — honest models degrade
      monotonically while sandbaggers *improve*. Best performer in the Poser
      benchmark (98%) — a rare white-box method that generalizes.

  - id: clymer-2024-poser
    title: "Poser: Unmasking Alignment-Faking LLMs by Manipulating Their Internals"
    authors: [Joshua Clymer, Caden Juang, Sarah Field]
    year: 2024
    venue: "arXiv preprint"
    arxiv_id: "2405.05466"
