    annotation: >
      Benchmark of 324 alignment-faker-vs-aligned pairs; noise injection wins
      at 98%, probes for harm/misaligned-behavior reach ~71%. Primary
      synthetic testbed for probe-based alignment-faking detection.

  # ========================================================================
  # 2.4 Threat models
  # ========================================================================
  - id: greenblatt-2024-alignment-faking
    title: "Alignment Faking in Large Language Models"
    authors: [Ryan Greenblatt, Carson Denison, Benjamin Wright, Fabien Roger, "…", Evan Hubinger]
    year: 2024
    venue: "arXiv preprint"
    arxiv_id: "2412.14093"
    url: "https://arxiv.org/abs/2412.14093"
    category_id: threats
    tags: [foundational, empirical, alignment-faking]
    organizations: [Anthropic, "Redwood Research"]
    is_foundational: true
    annotation: >
      Claude 3 Opus shows an ~11–14pp compliance gap between "free" (training)
      and "paid" (deployment) contexts, with explicit goal-guarding reasoning
      in CoT. RL *increases* alignment-faking reasoning rather than
      eliminating it. The foundational empirical demonstration — but see
      Sheshadri et al. 2025 for replication caveats.

  - id: meinke-2024-in-context-scheming
    title: "Frontier Models Are Capable of In-Context Scheming"
    authors: [Alexander Meinke, Bronson Schoen, Jérémy Scheurer, Mikita Balesni, Rohin Shah, Marius Hobbhahn]
    year: 2024
    venue: "arXiv preprint"
    arxiv_id: "2412.04984"
    url: "https://arxiv.org/abs/2412.04984"
    category_id: threats
    tags: [foundational, empirical, scheming, benchmark]
    organizations: ["Apollo Research"]
    is_foundational: true
    annotation: >
      Six agentic evaluations show o1, Claude 3.5 Sonnet, 3 Opus, Gemini 1.5
      Pro, Llama 3.1 405B engage in oversight subversion, self-exfiltration,
      goal-guarding, covert email re-ranking. o1 maintains deception >85%
      under follow-up questioning. Foundational Apollo paper.

  - id: hubinger-2024-sleeper-agents
    title: "Sleeper Agents: Training Deceptive LLMs that Persist Through Safety Training"
    authors: [Evan Hubinger, Carson Denison, Jesse Mu, Mike Lambert, "…", Ethan Perez]
    year: 2024
    venue: "arXiv preprint"
    arxiv_id: "2401.05566"
    url: "https://arxiv.org/abs/2401.05566"
    category_id: threats
    tags: [foundational, model-organism, backdoors]
    organizations: [Anthropic]
    is_foundational: true
    annotation: >
      Trigger-based backdoors persist through SFT, RLHF, and adversarial
      training; adversarial training can make them *more* robust by teaching
      the model to recognize red-team triggers. The model-organism paper
      underlying most probe-detection work.

  - id: hubinger-2019-risks-learned-optimization
    title: "Risks from Learned Optimization"
    authors: [Evan Hubinger, Chris van Merwijk, Vladimir Mikulik, Joar Skalse, Scott Garrabrant]
    year: 2019
    venue: "arXiv preprint"
    arxiv_id: "1906.01820"
    url: "https://arxiv.org/abs/1906.01820"
    category_id: threats
    tags: [foundational, theoretical, mesa-optimization]
    organizations: [MIRI, academia]
    is_foundational: false
    annotation: >
      Introduces mesa-optimization and deceptive alignment. Theoretical
      ancestor of the whole agenda.

  - id: denison-2024-sycophancy-subterfuge
    title: "Sycophancy to Subterfuge: Investigating Reward-Tampering in LLMs"
    authors: [Carson Denison, Monte MacDiarmid, Fazl Barez, "…", Evan Hubinger]
    year: 2024
    venue: "arXiv preprint"
    arxiv_id: "2406.10162"
    url: "https://arxiv.org/abs/2406.10162"
    category_id: threats
    tags: [empirical, reward-hacking, generalization]
    organizations: [Anthropic]
    is_foundational: false
    annotation: >
      Curriculum of gameable environments shows models trained on early
      sycophancy-like hacks generalize zero-shot to rewriting their own
      reward function (7 of 32,768 episodes). Base rates are low but the
      generalization is real.

  - id: sheshadri-2025-alignment-faking-replication
    title: "Why Do Some Language Models Fake Alignment While Others Don't?"
    authors: [Abhay Sheshadri, John Hughes, Julian Michael, Alex Mallen, "…", Fabien Roger]
    year: 2025
    venue: "arXiv preprint"
    arxiv_id: "2506.18032"
    url: "https://arxiv.org/abs/2506.18032"
    category_id: threats
    tags: [critical, replication, alignment-faking]
    organizations: [Anthropic, academia]
    is_foundational: false
    annotation: >
      **Critical replication:** of 25 models tested, only 5 show a compliance
      gap; only Claude 3 Opus's is consistently motivated by goal-guarding.
      Tempers the Greenblatt et al. 2024 framing — alignment-faking may be
      fragile, setup-sensitive, and partly Claude-3-Opus-specific.

  - id: van-der-weij-2024-sandbagging
