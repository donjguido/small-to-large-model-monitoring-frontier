    arxiv_id: "2506.14261"
    url: "https://arxiv.org/abs/2506.14261"
    category_id: activation
    subcategory_id: nonlinear-probes
    tags: [empirical, adversarial, negative-result]
    organizations: ["Google DeepMind", academia]
    is_foundational: false
    annotation: >
      RL can train models to evade latent probes while preserving harmful
      capability.

  - id: farquhar-2023-challenges-unsupervised
    title: "Challenges with Unsupervised LLM Knowledge Discovery"
    authors: [Sebastian Farquhar, Vikrant Varma, Zachary Kenton, Johannes Gasteiger, Vlad Mikulik, Rohin Shah]
